
<section class="bg-[#fff] flex min-h-screen items-center justify-center pt-6 pb-12 py-3.5 px-3">
  <div class="container mx-auto w-[450px]  ">
    
    <div class="rounded-xl border border-slate-300 bg-white p-6  sm:p-6">

     <div class="mb-5 flex items-center gap-3">
         <span class="inline-flex h-10 w-10 items-center justify-center rounded-full bg-[#e7f3ff] text-[#1877f2]"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-key-round" aria-hidden="true"><path d="M2.586 17.414A2 2 0 0 0 2 18.828V21a1 1 0 0 0 1 1h3a1 1 0 0 0 1-1v-1a1 1 0 0 1 1-1h1a1 1 0 0 0 1-1v-1a1 1 0 0 1 1-1h.172a2 2 0 0 0 1.414-.586l.814-.814a6.5 6.5 0 1 0-4-4z"></path><circle cx="16.5" cy="7.5" r=".5" fill="currentColor"></circle></svg></span>
      <div >
        <h1 class="mb-1 text-3xl font-medium text-gray-900">Change Password</h1>
        <p class="text-gray-500 text-center">Keep your account secure by using a strong password</p>
      </div>
     </div>

      <form [formGroup]="changePasswordForm" (ngSubmit)="submitForm()" class="space-y-3">
       <div class="relative">
        <input
        formControlName="password"
          type="passsword"
          id="password"
          class="block px-2.5 pb-2.5 pt-4 w-full text-sm text-heading bg-transparent rounded-base border-1 border-default-medium appearance-none focus:outline-none focus:ring-0 focus:border-brand peer"
          placeholder=" "
        />
        <label
          for="password"
          class="absolute text-sm text-body duration-300 transform -translate-y-4 scale-75 top-2 z-10 origin-[0] bg-neutral-primary px-2 peer-focus:px-2 peer-focus:text-fg-brand peer-placeholder-shown:scale-100 peer-placeholder-shown:-translate-y-1/2 peer-placeholder-shown:top-1/2 peer-focus:top-2 peer-focus:scale-75 peer-focus:-translate-y-4 rtl:peer-focus:translate-x-1/4 rtl:peer-focus:left-auto start-1"
        >
          <i class="fa-solid fa-key"></i> Password
        </label>
      </div>

    
             <div
        class="flex p-4 mb-4 text-sm text-fg-danger-strong rounded-base bg-danger-soft border border-danger-subtle"
        role="alert"
      >
        <span class="sr-only">Danger</span>
        <div>
          <ul class="mt-2 list-disc list-outside space-y-1 ps-2.5">

			     <li> Password is required.</li>
            <li>Must contain at least 8 chars, 1 uppercase, 1 lowercase, 1 number, and 1 special</li>
    
          </ul>
        </div>
      </div>
        


       <div class="relative">
        <input
        formControlName="rePassword"
          type="passsword"
          id="rePassword"
          class="block px-2.5 pb-2.5 pt-4 w-full text-sm text-heading bg-transparent rounded-base border-1 border-default-medium appearance-none focus:outline-none focus:ring-0 focus:border-brand peer"
          placeholder=" "
        />
        <label
          for="rePassword"
          class="absolute text-sm text-body duration-300 transform -translate-y-4 scale-75 top-2 z-10 origin-[0] bg-neutral-primary px-2 peer-focus:px-2 peer-focus:text-fg-brand peer-placeholder-shown:scale-100 peer-placeholder-shown:-translate-y-1/2 peer-placeholder-shown:top-1/2 peer-focus:top-2 peer-focus:scale-75 peer-focus:-translate-y-4 rtl:peer-focus:translate-x-1/4 rtl:peer-focus:left-auto start-1"
        >
          <i class="fa-solid fa-key"></i> Confirm Password
        </label>
      </div>


    
      <div
        class="flex p-4 mb-4 text-sm text-fg-danger-strong rounded-base bg-danger-soft border border-danger-subtle"
        role="alert"
      >
        <span class="sr-only">Danger</span>
        <div>
          <ul class="mt-2 list-disc list-outside space-y-1 ps-2.5">
	      <li>Please confirm your password.</li>
		   	  <li>Passwords do not match.</li>
          </ul>
        </div>
      </div>
     

        <button type="submit" disabled class="w-full disabled:cursor-not-allowed disabled:opacity-50 mt-4 rounded-full bg-blue-600 p-4 text-lg font-bold text-white shadow-md shadow-blue-100 hover:bg-blue-700 transition-all active:scale-[0.98]">
          Update password
        </button>
      </form>
      
    </div>
  </div>
</section>
