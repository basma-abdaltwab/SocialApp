
<section class="min-h-screen flex items-center justify-center bg-gray-100 p-3">

  <div class="bg-white rounded-lg shadow-md max-w-[680px] w-full border border-gray-200">
    
    <div class="p-4 flex items-center justify-between">
      
      <div class="flex items-center gap-3">
        <img [src]="postDetails.user.photo" class="w-12 h-12 rounded-full object-cover border-2 border-white shadow" alt="Profile">
        
        <div>
          <div class="flex items-center gap-2">
            <h2 class="font-semibold text-gray-900">{{ postDetails.user.name}}</h2>
            <span class="text-xs text-gray-500 bg-gray-100 px-2 py-0.5 rounded-full">public</span>
          </div>
          <p class="text-sm text-gray-500">
            
          </p>
        </div>
      </div>

      <button class="text-gray-500 hover:text-gray-700 p-2 rounded-full">
        <i class="fa-solid fa-ellipsis"></i>
      </button>

    </div>

    <div class="px-4 pb-4 space-y-3">
      <p class="text-gray-800">{{postDetails.body}}</p>
      
      @if (postDetails.image) {
        <img [src]="postDetails.image" class="w-full rounded-lg object-cover" alt="">
      }
    </div>

    <div class="border-t border-gray-200">
      
      <div class="px-4 py-2 flex items-center justify-between text-sm text-gray-600">
        <div class="flex items-center gap-1.5">
          <i class="fa-solid fa-thumbs-up text-blue-600"></i>
          0likes
        </div>
        
        <div class="flex items-center gap-4">
          <p>0shares</p>
          <p> {{postDetails.commentsCount}}comments</p>
          <a  class="text-blue-600 hover:underline">View details</a>
        </div>
      </div>

      <div class="border-t border-gray-200 flex items-center text-center">
        <button class="flex-1 p-3 text-gray-700 font-medium hover:bg-gray-100 flex items-center justify-center gap-2">
          <i class="fa-solid fa-thumbs-up"></i>
          like
        </button>
        <button class="flex-1 p-3 text-gray-700 font-medium hover:bg-gray-100 flex items-center justify-center gap-2">
          <i class="fa-regular fa-message"></i>
          Comment
        </button>
        <button class="flex-1 p-3 text-gray-700 font-medium hover:bg-gray-100 flex items-center justify-center gap-2">
          <i class="fa-solid fa-share"></i>
          Share
        </button>
      </div>

    </div>

  </div>

</section>
