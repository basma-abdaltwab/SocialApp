

<section class="max-w-2xl mx-auto my-10 bg-white border border-slate-300 rounded-2xl p-4 font-sans">
  <form (submit)="SubmitForm($event)">
  <div  class="flex items-start justify-between">
    <div class="flex gap-3">
      <img src="/images/cb2129df93c585492f8bb559cb5e1651.jpg" alt="Profile" class="w-12 h-12 rounded-full object-cover">
      
      <div>
        <h3 class="font-bold text-gray-900 leading-tight hover:underline cursor-pointer">basma abdaltwab</h3>
        <div class="flex items-center gap-1.5 text-gray-500 text-sm">
          <span>@basma1995</span>
          <div class="flex items-center gap-1 hover:bg-gray-100 px-1 rounded cursor-pointer">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
            </svg>
            <span
             [formControl]="privacy" 
             class="text-xs font-medium">Only me

            </span>
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
            </svg>
          </div>
        </div>
      </div>
    </div>
    
    <button 
    title="button" class="text-gray-400 hover:bg-gray-100 p-1 rounded-full transition">
      <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20">
        <path d="M6 10a2 2 0 11-4 0 2 2 0 014 0zM12 10a2 2 0 11-4 0 2 2 0 014 0zM18 10a2 2 0 11-4 0 2 2 0 014 0z" />
      </svg>
    </button>
  </div>

  <div class="mt-4">
    <textarea 
    [formControl]="content"
      class="w-full min-h-[120px] p-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent resize-none text-gray-800"
      placeholder="What's on your mind?">txt
    </textarea>
  </div>
<div class="flex justify-between ">
  <div class="my-3">
    <input (change)="changeImg($event)" type="file" id="file" class="hidden" />
      
      <label
        for="file"
        class="flex cursor-pointer items-center gap-2 text-slate-600 hover:bg-slate-50 px-2 py-1.5 rounded-lg transition-colors group"
      >
        <i
          class="fa-regular fa-image text-[#22c55e] text-[1.1rem] group-hover:scale-110 transition-transform"
        ></i>
        <span class="text-[14px] font-semibold text-slate-600">Photo/video</span>
      </label>
  </div>


   <div class="flex justify-end gap-2 mt-4 pb-4 border-b border-gray-100">

   
    <button type="submit" class=" cursor-pointer px-6 py-1.5 bg-[#1a73e8] text-white font-semibold rounded-full hover:bg-blue-600 shadow-md transition">
      Save
    </button>
  </div>
</div>

  <div class="flex items-center justify-between py-3 text-sm text-gray-500">
    <div class="flex items-center gap-1 cursor-pointer hover:underline">
      <div class="bg-blue-500 p-1 rounded-full text-white">
        <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20">
          <path d="M2 10.5a1.5 1.5 0 113 0v6a1.5 1.5 0 01-3 0v-6zM6 10.333v5.43a2 2 0 001.106 1.79l.05.025A4 4 0 008.943 18h5.416a2 2 0 001.962-1.608l1.2-6A2 2 0 0015.56 8H12V4a2 2 0 00-2-2 1 1 0 00-1 1v.667a4 4 0 01-.8 2.4L6.8 7.933a4 4 0 00-.8 2.4z" />
        </svg>
      </div>
      <span>0 likes</span>
    </div>
    <div class="flex gap-3">
      <span class="hover:underline cursor-pointer">0 shares</span>
      <span class="hover:underline cursor-pointer">0 comments</span>
      <button class="text-blue-600 font-bold hover:underline">View details</button>
    </div>
  </div>

  <div class="grid grid-cols-3 border-t border-gray-100 pt-1">
    <button class="flex items-center justify-center gap-2 py-2 text-gray-600 font-medium hover:bg-gray-50 rounded-lg transition">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 10h4.757c1.246 0 2.256 1.01 2.256 2.256 0 .359-.085.715-.246 1.036l-2.023 4.046c-.23.461-.7.752-1.213.752H10V10l3-7V3h1v7h-1zM10 10v10H6a2 2 0 01-2-2v-8a2 2 0 012-2h4z" /></svg>
      Like
    </button>
    <button class="flex items-center justify-center gap-2 py-2 text-gray-600 font-medium hover:bg-gray-50 rounded-lg transition">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" /></svg>
      Comment
    </button>
    <button class="flex items-center justify-center gap-2 py-2 text-gray-600 font-medium hover:bg-gray-50 rounded-lg transition">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z" /></svg>
      Share
    </button>
  </div>
  </form>
</section>
